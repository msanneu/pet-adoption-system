{% extends "admin_layout.html" %}
{% block content %}

<div class="mb-4">
    <a href="javascript:history.back()" class="text-decoration-none text-muted small fw-bold text-uppercase">
        &larr; Back to Previous Page
    </a>
</div>

<div class="card p-4 border-0 shadow-sm" style="border-top: 4px solid var(--accent-gold) !important;">
    <h4 class="fw-bold mb-4" style="color: var(--primary-navy);">Edit Profile: {{ pet.name }}</h4>

    <form action="{{ url_for('edit_pet', pet_id=pet.id) }}" method="POST" enctype="multipart/form-data">
        <div class="row g-4">
            
            <div class="col-md-4 text-center border-end">
                <label class="form-label small fw-bold text-muted text-uppercase mb-3">Current Photo</label><br>
                <img src="{{ url_for('static', filename='uploads/' + pet.photo) if pet.photo else 'https://via.placeholder.com/300' }}" 
                     class="img-fluid rounded border shadow-sm mb-3" style="max-height: 250px; object-fit: cover; width: 100%;">
                
                <input type="file" name="photo" class="form-control form-control-sm rounded-0" accept=".jpg,.jpeg,.png,.webp">
                <small class="text-muted x-small d-block mt-1">Leave this blank to keep the current photo.</small>
            </div>

            <div class="col-md-8">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Pet Name</label>
                        <input type="text" name="name" class="form-control rounded-0" value="{{ pet.name }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Breed</label>
                        <input type="text" name="breed" class="form-control rounded-0" value="{{ pet.breed }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Status</label>
                        <select name="status" class="form-select rounded-0">
                            <option value="Available" {% if pet.status == 'Available' %}selected{% endif %}>Available</option>
                            <option value="Approved" {% if pet.status == 'Approved' %}selected{% endif %}>Approved</option>
                            <option value="Adopted" {% if pet.status == 'Adopted' %}selected{% endif %}>Adopted</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Age Category</label>
                        <select name="age_category" class="form-select rounded-0">
                            <option value="Puppy" {% if pet.age_category == 'Puppy' %}selected{% endif %}>Puppy</option>
                            <option value="Kitten" {% if pet.age_category == 'Kitten' %}selected{% endif %}>Kitten</option>
                            <option value="Young" {% if pet.age_category == 'Young' %}selected{% endif %}>Young</option>
                            <option value="Adult" {% if pet.age_category == 'Adult' %}selected{% endif %}>Adult</option>
                            <option value="Senior" {% if pet.age_category == 'Senior' %}selected{% endif %}>Senior</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Gender</label>
                        <select name="gender" class="form-select rounded-0">
                            <option value="Male" {% if pet.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if pet.gender == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Size</label>
                        <select name="size" class="form-select rounded-0">
                            <option value="Small" {% if pet.size == 'Small' %}selected{% endif %}>Small</option>
                            <option value="Medium" {% if pet.size == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="Large" {% if pet.size == 'Large' %}selected{% endif %}>Large</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Energy Level</label>
                        <select name="energy_level" class="form-select rounded-0">
                            <option value="Low" {% if pet.energy_level == 'Low' %}selected{% endif %}>Low</option>
                            <option value="Moderate" {% if pet.energy_level == 'Moderate' %}selected{% endif %}>Moderate</option>
                            <option value="High" {% if pet.energy_level == 'High' %}selected{% endif %}>High</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted text-uppercase">Fixed?</label>
                        <select name="spayed_neutered" class="form-select rounded-0">
                            <option value="Yes" {% if pet.spayed_neutered == 'Yes' %}selected{% endif %}>Yes</option>
                            <option value="No" {% if pet.spayed_neutered == 'No' %}selected{% endif %}>No</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Vaccination Status</label>
                        <input type="text" name="vac_status" class="form-control rounded-0" placeholder="e.g., Complete, Pending 2nd Shot" value="{{ pet.vac_status }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase">Last Vaccine Date</label>
                        <input type="text" name="vac_date" class="form-control rounded-0" placeholder="e.g., Oct 2025" value="{{ pet.vac_date }}">
                    </div>
                </div>
            </div>
            
            <div class="col-12 mt-4 pt-4 border-top">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted text-uppercase">Special Medical Needs</label>
                    <input type="text" name="special_needs" class="form-control rounded-0" placeholder="Leave as N/A if none" value="{{ pet.special_needs }}">
                </div>
                
                <div class="mb-0">
                    <label class="form-label small fw-bold text-muted text-uppercase">Behavioral Notes & Description</label>
                    <textarea name="other_description" class="form-control rounded-0" rows="5" placeholder="Describe the pet's personality, history, and ideal home environment...">{{ pet.other_description }}</textarea>
                </div>
            </div>
        </div>
        
        <div class="text-end mt-4 pt-3 border-top">
            <a href="javascript:history.back()" class="btn btn-light rounded-0 px-4 border me-2">CANCEL</a>
            <button type="submit" class="btn btn-navy rounded-0 px-5 fw-bold">SAVE CHANGES</button>
        </div>
    </form>
</div>

{% endblock %}
